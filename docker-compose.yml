services:
  cms:
    build: ./cms
    restart: unless-stopped
    env_file:
      - ./cms/.env
    environment:
      NODE_ENV: production
    volumes:
      # All persistent state lives in these two host directories — the sqlite
      # db and the media library. Back these up; the containers are disposable.
      - ./cms/data:/app/data
      - ./cms/public/uploads:/app/public/uploads
    ports:
      # Published on all interfaces so the admin is reachable over the LAN and
      # Tailscale (a 127.0.0.1 binding only accepts loopback, so a request
      # arriving on the tailscale0 interface never lands).
      # This assumes the host is NOT directly internet-exposed — on a public VPS
      # this puts the admin panel on the internet. There, bind it to the
      # tailscale IP instead: "100.x.y.z:7108:1337".
      - "7108:1337"

  site:
    build: ./site
    restart: unless-stopped
    env_file:
      - ./site/.env # provides STRAPI_TOKEN
    environment:
      NODE_ENV: production
      # Overrides the localhost value from site/.env — inside the compose
      # network the CMS is reachable by service name.
      STRAPI_URL: http://cms:1337
    ports:
      # Public entrypoint: point the Cloudflare Tunnel at http://<host>:7100.
      - "7100:4321"
    depends_on:
      - cms
